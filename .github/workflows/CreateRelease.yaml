name: " Create release"
run-name: "Create release - Version ${{ inputs.tag }}"

concurrency:
  group: ${{ github.workflow }}

on:
  workflow_dispatch:
    inputs:
      buildVersion:
        description: Build version to promote to release (default is latest)
        required: false
        default: "latest"
      name:
        description: Name of this release
        required: true
        default: ""
      tag:
        description: Tag of this release (needs to be semantic version string https://semver.org, ex. 1.0.0)
        required: true
        default: ""
      releaseType:
        description: Release, prerelease or draft?
        type: choice
        options:
          - Release
          - Prerelease
          - Draft
        default: Release
      createReleaseBranch:
        description: Create Release Branch?
        type: boolean
        default: false
      releaseBranchPrefix:
        description: The prefix for the release branch. Used only if 'Create Release Branch?' is checked.
        type: string
        default: release/
      updateVersionNumber:
        description: New Version Number in main branch. Use Major.Minor (optionally add .Build for versioningstrategy 3) for absolute change, or +1, +0.1 (or +0.0.1 for versioningstrategy 3) incremental change.
        required: false
        default: ""
      skipUpdatingDependencies:
        description: Skip updating dependency version numbers in all apps.
        type: boolean
        default: false
      directCommit:
        description: Direct Commit?
        type: boolean
        default: false
      useGhTokenWorkflow:
        description: Use GhTokenWorkflow for PR/Commit?
        type: boolean
        default: false

permissions:
  actions: read
  contents: write
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: powershell

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  CreateRelease:
    needs: []
    runs-on: [windows-latest]
    outputs:
      artifacts: ${{ steps.determineArtifactsForRelease.outputs.artifacts }}
      releaseId: ${{ steps.createrelease.outputs.releaseId }}
      commitish: ${{ steps.determineArtifactsForRelease.outputs.commitish }}
      releaseVersion: ${{ steps.createreleasenotes.outputs.releaseVersion }}
      telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
    steps:
      - name: Dump Workflow Information
        uses: microsoft/AL-Go-Actions/DumpWorkflowInfo@v8.3
        with:
          shell: powershell

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@v8.3
        with:
          shell: powershell

      - name: Read settings
        id: ReadSettings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: powershell
          get: templateUrl,repoName,type,powerPlatformSolutionFolder

      - name: Validate Workflow Input
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: microsoft/AL-Go-Actions/ValidateWorkflowInput@v8.3
        with:
          shell: powershell

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.3
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: "TokenForPush,ghTokenWorkflow"
          useGhTokenWorkflowForPush: "${{ github.event.inputs.useGhTokenWorkflow }}"

      - name: Determine Projects
        id: determineProjects
        uses: microsoft/AL-Go-Actions/DetermineProjectsToBuild@v8.3
        with:
          shell: powershell

      - name: Check for updates to AL-Go system files
        uses: microsoft/AL-Go-Actions/CheckForUpdates@v8.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          templateUrl: ${{ env.templateUrl }}
          token: ${{ fromJson(steps.ReadSecrets.outputs.Secrets).ghTokenWorkflow }}
          downloadLatest: true

      - name: Determine artifacts for release
        uses: microsoft/AL-Go-Actions/DetermineArtifactsForRelease@v8.3
        id: determineArtifactsForRelease
        with:
          shell: powershell
          buildVersion: ${{ github.event.inputs.buildVersion }}
          GITHUB_TOKEN: ${{ github.token }}
          TOKENFORPUSH: ${{ steps.ReadSecrets.outputs.TokenForPush }}
          ProjectsJson: ${{ steps.determineProjects.outputs.ProjectsJson }}

      - name: Prepare release notes
        id: createreleasenotes
        uses: microsoft/AL-Go-Actions/CreateReleaseNotes@v8.3
        with:
          shell: powershell
          buildVersion: ${{ github.event.inputs.buildVersion }}
          tag_name: ${{ github.event.inputs.tag }}
          target_commitish: ${{ steps.determineArtifactsForRelease.outputs.commitish }}

      - name: Create release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: createrelease
        env:
          bodyMD: ${{ steps.createreleasenotes.outputs.releaseNotes }}
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.name }}
          releaseType: ${{ github.event.inputs.releaseType }}
          prerelease: ${{ github.event.inputs.releaseType == 'Prerelease' }}
          commitish: ${{ steps.determineArtifactsForRelease.outputs.commitish }}
        with:
          github-token: ${{ steps.ReadSecrets.outputs.TokenForPush }}
          script: |
            var bodyMD = process.env.bodyMD
            const createReleaseResponse = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.tag_name,
              name: process.env.name,
              body: bodyMD.replaceAll('\\n','\n').replaceAll('%0A','\n').replaceAll('%0D','\n').replaceAll('%25','%'),
              draft: (process.env.releaseType == 'Draft'),
              prerelease: (process.env.releaseType == 'Prerelease'),
              make_latest: 'legacy',
              target_commitish: process.env.commitish
            });
            const {
              data: { id: releaseId, html_url: htmlUrl, upload_url: uploadUrl }
            } = createReleaseResponse;
            core.setOutput('releaseId', releaseId);

  UploadArtifacts:
    needs: [CreateRelease]
    runs-on: [windows-latest]
    name: Upload ${{ matrix.name }}
    strategy:
      matrix: ${{ fromJson(needs.CreateRelease.outputs.artifacts) }}
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: powershell

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.3
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: "nuGetContext,storageContext,TokenForPush"
          useGhTokenWorkflowForPush: "${{ github.event.inputs.useGhTokenWorkflow }}"

      - name: Download artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_URL: ${{ matrix.url }}
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0
          Write-Host "Downloading artifact $ENV:MATRIX_NAME"
          $headers = @{
            "Authorization" = "token $ENV:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
            "Accept" = "application/vnd.github+json"
          }
          Invoke-WebRequest -UseBasicParsing -Headers $headers -Uri $ENV:MATRIX_URL -OutFile "$($ENV:MATRIX_NAME).zip"

      - name: Upload release artifacts
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          releaseId: ${{ needs.createrelease.outputs.releaseId }}
          MATRIX_NAME: ${{ matrix.name }}
        with:
          github-token: ${{ steps.ReadSecrets.outputs.TokenForPush }}
          script: |
            const releaseId = process.env.releaseId
            const matrixName = process.env.MATRIX_NAME
            const assetPath = `${matrixName}.zip`
            const assetName = encodeURIComponent(`${matrixName}.zip`.replaceAll(' ','.')).replaceAll('%','')
            const fs = require('fs');
            const uploadAssetResponse = await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: assetName,
              data: fs.readFileSync(assetPath)
            });

      - name: Deliver to NuGet
        uses: microsoft/AL-Go-Actions/Deliver@v8.3
        if: ${{ fromJson(steps.ReadSecrets.outputs.Secrets).nuGetContext != '' }}
        env:
          Secrets: "${{ steps.ReadSecrets.outputs.Secrets }}"
        with:
          shell: powershell
          type: "Release"
          projects: ${{ matrix.project }}
          deliveryTarget: "NuGet"
          artifacts: ${{ github.event.inputs.buildVersion }}
          atypes: "Apps,TestApps"

      - name: Deliver to Storage
        uses: microsoft/AL-Go-Actions/Deliver@v8.3
        if: ${{ fromJson(steps.ReadSecrets.outputs.Secrets).storageContext != '' }}
        env:
          Secrets: "${{ steps.ReadSecrets.outputs.Secrets }}"
        with:
          shell: powershell
          type: "Release"
          projects: ${{ matrix.project }}
          deliveryTarget: "Storage"
          artifacts: ${{ github.event.inputs.buildVersion }}
          atypes: "Apps,TestApps,Dependencies"

  CreateReleaseBranch:
    needs: [CreateRelease, UploadArtifacts]
    if: ${{ github.event.inputs.createReleaseBranch=='true' }}
    runs-on: [windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: "${{ needs.createRelease.outputs.commitish }}"

      - name: Create Release Branch
        env:
          releaseBranchPrefix: ${{ github.event.inputs.releaseBranchPrefix }}
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0
          $releaseBranch = "$($env:releaseBranchPrefix)" + "${{ needs.CreateRelease.outputs.releaseVersion }}"
          Write-Host "Creating release branch $releaseBranch"
          git checkout -b $releaseBranch
          git config user.name ${{ github.actor}}
          git config user.email ${{ github.actor}}@users.noreply.github.com
          git commit --allow-empty -m "Release branch $releaseBranch"
          git push origin $releaseBranch

  UpdateVersionNumber:
    needs: [CreateRelease, UploadArtifacts]
    if: ${{ github.event.inputs.updateVersionNumber!='' }}
    runs-on: [windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.3
        with:
          shell: powershell

      - name: Read secrets
        id: ReadSecrets
        uses: microsoft/AL-Go-Actions/ReadSecrets@v8.3
        with:
          shell: powershell
          gitHubSecrets: ${{ toJson(secrets) }}
          getSecrets: "TokenForPush"
          useGhTokenWorkflowForPush: "${{ github.event.inputs.useGhTokenWorkflow }}"

      - name: Update Version Number
        uses: microsoft/AL-Go-Actions/IncrementVersionNumber@v8.3
        with:
          shell: powershell
          token: ${{ steps.ReadSecrets.outputs.TokenForPush }}
          versionNumber: ${{ github.event.inputs.updateVersionNumber }}
          skipUpdatingDependencies: ${{ github.event.inputs.skipUpdatingDependencies }}
          directCommit: ${{ github.event.inputs.directCommit }}

  CustomJob-UpdatePublishSchedule:
    name: Update LDR Publish Schedule
    needs: [CreateRelease, UploadArtifacts]
    if: needs.CreateRelease.result == 'success' && needs.UploadArtifacts.result == 'success'
    runs-on: [ubuntu-latest]
    defaults:
      run:
        shell: bash
    steps:
      - name: Generate GitHub App token
        id: GenerateJWT
        shell: pwsh
        env:
          GH_TOKEN_WORKFLOW: ${{ secrets.GHTOKENWORKFLOW }}
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0
          if (-not $env:GH_TOKEN_WORKFLOW) {
            Write-Host "::error::Secret GHTOKENWORKFLOW is not configured"
            exit 1
          }
          $tokenData = $env:GH_TOKEN_WORKFLOW | ConvertFrom-Json
          $clientId = $tokenData.GitHubAppClientId
          $privateKey = $tokenData.PrivateKey -replace '\\n', "`n"
          if ($privateKey -notmatch "`n") {
            if ($privateKey -match '^(-----BEGIN [^-]+-----)(.+?)(-----END [^-]+-----)$') {
              $header = $Matches[1]; $body = $Matches[2]; $footer = $Matches[3]
              $bodyLines = for ($i = 0; $i -lt $body.Length; $i += 64) { $body.Substring($i, [Math]::Min(64, $body.Length - $i)) }
              $privateKey = "$header`n$($bodyLines -join "`n")`n$footer"
            }
          }
          $tempKeyFile = Join-Path $env:RUNNER_TEMP "gh-app-key-$([Guid]::NewGuid()).pem"
          [System.IO.File]::WriteAllText($tempKeyFile, $privateKey, [System.Text.UTF8Encoding]::new($false))
          try {
            $now = [Math]::Floor([decimal](Get-Date -UFormat %s))
            $headerEncoded  = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes(('{"alg":"RS256","typ":"JWT"}'))).TrimEnd('=').Replace('+','-').Replace('/','_')
            $payloadEncoded = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes(("{""iat"":$($now-60),""exp"":$($now+600),""iss"":""$clientId""}"))).TrimEnd('=').Replace('+','-').Replace('/','_')
            $dataFile = Join-Path $env:RUNNER_TEMP "data-$([Guid]::NewGuid()).txt"
            $sigFile  = Join-Path $env:RUNNER_TEMP "sig-$([Guid]::NewGuid()).bin"
            "$headerEncoded.$payloadEncoded" | Out-File $dataFile -Encoding ASCII -NoNewline
            & openssl dgst -sha256 -sign $tempKeyFile -out $sigFile $dataFile 2>&1 | Out-Null
            $sigEncoded = [Convert]::ToBase64String([System.IO.File]::ReadAllBytes($sigFile)).TrimEnd('=').Replace('+','-').Replace('/','_')
            $jwt = "$headerEncoded.$payloadEncoded.$sigEncoded"
            Remove-Item $dataFile, $sigFile -Force -ErrorAction SilentlyContinue
            $headers = @{ "Accept"="application/vnd.github+json"; "Authorization"="Bearer $jwt"; "X-GitHub-Api-Version"="2022-11-28" }
            $owner = "${{ github.repository_owner }}"
            try { $installation = Invoke-RestMethod -Uri "https://api.github.com/orgs/$owner/installation" -Headers $headers -Method Get }
            catch { $installation = Invoke-RestMethod -Uri "https://api.github.com/users/$owner/installation" -Headers $headers -Method Get }
            $token = (Invoke-RestMethod -Uri $installation.access_tokens_url -Headers $headers -Method Post).token
            Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "token=$token"
            Write-Host "[OK] GitHub App token generated"
          }
          finally { Remove-Item $tempKeyFile -Force -ErrorAction SilentlyContinue }

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.GenerateJWT.outputs.token }}

      - name: Update cron schedule and commit
        run: |
          horaPublicacion=$(jq -r '.HoraPublicacion' .github/LDR-Settings.json)
          if [ -z "$horaPublicacion" ] || [ "$horaPublicacion" = "null" ]; then
            echo "ERROR: HoraPublicacion not set in LDR-Settings.json"
            exit 1
          fi
          echo "HoraPublicacion leída: $horaPublicacion"
          hour=$(echo "$horaPublicacion" | cut -d: -f1 | awk '{print int($1)}')
          minute=$(echo "$horaPublicacion" | cut -d: -f2 | awk '{print int($1)}')
          dayOfMonth=$(date +%-d)
          month=$(date +%-m)
          newCron="$minute $hour $dayOfMonth $month *"
          echo "Nueva expresión cron: $newCron"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }}

          NEW_CRON="$newCron" python3 << 'PYEOF'
          import os, re
          filepath = '.github/workflows/LDR_PublicarEnProduccionRetardado.yaml'
          new_cron = os.environ['NEW_CRON']
          with open(filepath) as f:
              lines = f.readlines()
          in_on_block = False
          schedule_line_idx = None
          cron_line_idx = None
          for i, line in enumerate(lines):
              stripped = line.lstrip()
              indent = len(line) - len(stripped)
              if re.match(r'^on:\s*$', line):
                  in_on_block = True
                  continue
              if in_on_block:
                  if stripped and indent == 0:
                      in_on_block = False
                      continue
                  if re.match(r'\s+schedule:\s*$', line):
                      schedule_line_idx = i
                  if schedule_line_idx is not None and '- cron:' in line:
                      cron_line_idx = i
                      break
          if cron_line_idx is not None:
              m = re.match(r'(\s+)', lines[cron_line_idx])
              ind = m.group(1) if m else '        '
              lines[cron_line_idx] = f"{ind}- cron: '{new_cron}'\n"
              print(f'Cron actualizado: {new_cron}')
          elif schedule_line_idx is not None:
              m = re.match(r'(\s+)', lines[schedule_line_idx])
              ind = (m.group(1) + '    ') if m else '        '
              lines.insert(schedule_line_idx + 1, f"{ind}- cron: '{new_cron}'\n")
              print(f'Cron añadido bajo schedule existente: {new_cron}')
          else:
              for i, line in enumerate(lines):
                  if re.match(r'^on:\s*$', line):
                      lines.insert(i + 1, f"    schedule:\n        - cron: '{new_cron}'\n")
                      print(f'Sección schedule y cron creados: {new_cron}')
                      break
          with open(filepath, 'w') as f:
              f.writelines(lines)
          PYEOF

          echo "Schedule actualizado:"
          grep -A2 'schedule:' .github/workflows/LDR_PublicarEnProduccionRetardado.yaml || true

          git add .github/workflows/LDR_PublicarEnProduccionRetardado.yaml
          if git diff --cached --quiet; then
            echo "Sin cambios en el cron, nada que commitear"
          else
            git commit -m "chore: actualizar schedule LDR tras release ${{ needs.CreateRelease.outputs.releaseVersion }}"
            git push
          fi

  PostProcess:
    needs:
      [CreateRelease, UploadArtifacts, CreateReleaseBranch, UpdateVersionNumber]
    if: always()
    runs-on: [windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Finalize the workflow
        id: PostProcess
        uses: microsoft/AL-Go-Actions/WorkflowPostProcess@v8.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          telemetryScopeJson: ${{ needs.CreateRelease.outputs.telemetryScopeJson }}
          currentJobContext: ${{ toJson(job) }}

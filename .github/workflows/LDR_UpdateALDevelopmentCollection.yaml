name: "LDR: Update AL Development Collection"

on:
  workflow_dispatch:
    inputs:
      templateUrl:
        description: Template Repository URL (leave empty to use templateUrl from AL-Go-Settings.json)
        required: false
        default: ""
      downloadLatest:
        description: Download latest from template repository
        type: boolean
        default: true
      directCommit:
        description: Direct Commit?
        type: boolean
        default: true
      includeBranches:
        description: Specify a comma-separated list of branches to update. Wildcards are supported. Leave empty to update the current branch only.
        required: false
        default: ""
  workflow_run:
    workflows: [" Update AL-Go System Files", "Update AL-Go System Files"]
    types: [completed]
    branches: ["main"]

permissions:
  actions: read
  contents: write
  pull-requests: write
  id-token: write

defaults:
  run:
    shell: powershell

env:
  ALGoOrgSettings: ${{ vars.ALGoOrgSettings }}
  ALGoRepoSettings: ${{ vars.ALGoRepoSettings }}

jobs:
  Initialize:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest
    name: Initialize
    outputs:
      UpdateBranches: ${{ steps.GetBranches.outputs.Result }}
      TemplateUrl: ${{ steps.DetermineTemplateUrl.outputs.TemplateUrl }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read settings
        id: ReadSettings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.2
        with:
          shell: powershell
          get: templateUrl

      - name: Calculate Branches to Update
        id: GetBranches
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0

          # Determine include branches based on trigger type
          if('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $includeBranchesInput = '${{ github.event.inputs.includeBranches }}'
            if ([string]::IsNullOrWhiteSpace($includeBranchesInput)) {
              # Use current branch when manual trigger with empty input
              $includeBranchesInput = '${{ github.ref_name }}'
            }
          }
          else {
            # workflow_run trigger - use main branch (configured in trigger)
            $includeBranchesInput = 'main'
          }

          Write-Host "Include branches input: $includeBranchesInput"

          # Parse branch patterns (comma-separated)
          $branchPatterns = $includeBranchesInput -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ }

          # Get all branches from repository
          $allBranches = @(git branch -r | ForEach-Object { 
            $branch = $_.Trim()
            if ($branch -match '^origin/(.+)$' -and $Matches[1] -notmatch '^HEAD') {
              $Matches[1]
            }
          })

          Write-Host "All repository branches: $($allBranches -join ', ')"
          Write-Host "Branch patterns: $($branchPatterns -join ', ')"

          # Match branches against patterns (supports wildcards)
          $matchedBranches = @()
          foreach ($pattern in $branchPatterns) {
            # Convert wildcard pattern to regex
            $regexPattern = "^" + [regex]::Escape($pattern).Replace('\*', '.*').Replace('\?', '.') + "$"
            
            foreach ($branch in $allBranches) {
              if ($branch -match $regexPattern -and $matchedBranches -notcontains $branch) {
                $matchedBranches += $branch
                Write-Host "  Matched: $branch (pattern: $pattern)"
              }
            }
          }

          if ($matchedBranches.Count -eq 0) {
            Write-Host "::warning::No branches matched the patterns. Using current branch: ${{ github.ref_name }}"
            $matchedBranches = @('${{ github.ref_name }}')
          }

          Write-Host "Branches to update: $($matchedBranches -join ', ')"

          # Create JSON output in AL-Go format
          $result = @{
            branches = $matchedBranches
          } | ConvertTo-Json -Compress

          Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "Result=$result"

      - name: Determine Template URL
        id: DetermineTemplateUrl
        env:
          TemplateUrlAsInput: "${{ github.event.inputs.templateUrl }}"
        run: |
          $templateUrl = $env:templateUrl # Available from ReadSettings step (from .github/AL-Go-Settings.json)
          if ($ENV:TemplateUrlAsInput) {
            # Use the input value if it is provided (manual override)
            $templateUrl = $ENV:TemplateUrlAsInput
            Write-Host "Using template URL from input: $templateUrl"
          }
          elseif ($templateUrl) {
            Write-Host "Using template URL from AL-Go-Settings.json: $templateUrl"
          }
          else {
            # Fallback to this repository
            $templateUrl = "https://github.com/${{ github.repository }}@${{ github.ref_name }}"
            Write-Host "No template URL configured, using current repository: $templateUrl"
          }
          Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "TemplateUrl=$templateUrl"

  UpdateALDevelopmentCollection:
    name: "[${{ matrix.branch }}] Update AL Development Collection"
    needs: [Initialize]
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.Initialize.outputs.UpdateBranches).branches }}
      fail-fast: false

    steps:
      - name: Dump Workflow Information
        uses: microsoft/AL-Go-Actions/DumpWorkflowInfo@v8.2
        with:
          shell: powershell

      - name: Generate GitHub App JWT
        id: GenerateJWT
        env:
          GH_TOKEN_WORKFLOW: ${{ secrets.GHTOKENWORKFLOW }}
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0

          # Check if secret exists
          if (-not $env:GH_TOKEN_WORKFLOW) {
            Write-Host "::error::Secret GHTOKENWORKFLOW is not configured"
            exit 1
          }

          # Parse ghTokenWorkflow JSON
          try {
            $tokenData = $env:GH_TOKEN_WORKFLOW | ConvertFrom-Json
            $clientId = $tokenData.GitHubAppClientId
            $privateKey = $tokenData.PrivateKey
            
            if (-not $clientId -or -not $privateKey) {
              Write-Host "::error::ghTokenWorkflow must contain GitHubAppClientId and PrivateKey"
              exit 1
            }
            
            # Replace literal \n with actual newlines
            $privateKey = $privateKey -replace '\\n', "`n"
            
            # If still no newlines, try to reformat PEM (it might be all in one line)
            if ($privateKey -notmatch "`n") {
              Write-Host "Reformatting PEM key from single line..."
              # Extract header, body, and footer
              if ($privateKey -match '^(-----BEGIN [^-]+-----)(.+?)(-----END [^-]+-----)$') {
                $header = $Matches[1]
                $body = $Matches[2]
                $footer = $Matches[3]
                
                # Split body into 64-character lines
                $bodyLines = @()
                for ($i = 0; $i -lt $body.Length; $i += 64) {
                  $bodyLines += $body.Substring($i, [Math]::Min(64, $body.Length - $i))
                }
                
                $privateKey = "$header`n$($bodyLines -join "`n")`n$footer"
              }
            }
          }
          catch {
            Write-Host "::error::Failed to parse ghTokenWorkflow as JSON: $_"
            exit 1
          }

          # Save private key to temp file
          $tempKeyFile = Join-Path $env:TEMP "gh-app-key-$([Guid]::NewGuid()).pem"
          [System.IO.File]::WriteAllText($tempKeyFile, $privateKey, [System.Text.UTF8Encoding]::new($false))

          # Debug: Verify the key file
          Write-Host "Private key file size: $((Get-Item $tempKeyFile).Length) bytes"
          Write-Host "First line of key: $((Get-Content $tempKeyFile -TotalCount 1))"
          Write-Host "Last line of key: $((Get-Content $tempKeyFile | Select-Object -Last 1))"
          Write-Host "Total lines: $((Get-Content $tempKeyFile).Count)"
          $verifyOutput = & openssl rsa -in $tempKeyFile -check -noout 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Private key validation failed: $verifyOutput"
            Write-Host "Key file content (first 100 chars): $($privateKey.Substring(0, [Math]::Min(100, $privateKey.Length)))"
            exit 1
          }
          Write-Host "Private key validated successfully"

          try {
            # Generate JWT header and payload
            $now = [Math]::Floor([decimal](Get-Date -UFormat %s))
            $iat = $now - 60
            $exp = $now + 600
            
            $headerJson = @{
              alg = "RS256"
              typ = "JWT"
            } | ConvertTo-Json -Compress
            
            $payloadJson = @{
              iat = $iat
              exp = $exp
              iss = $clientId
            } | ConvertTo-Json -Compress
            
            # Base64 URL encode function
            function ConvertTo-Base64Url {
              param([string]$text)
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($text)
              $base64 = [Convert]::ToBase64String($bytes)
              return $base64.TrimEnd('=').Replace('+', '-').Replace('/', '_')
            }
            
            $headerEncoded = ConvertTo-Base64Url -text $headerJson
            $payloadEncoded = ConvertTo-Base64Url -text $payloadJson
            $dataToSign = "$headerEncoded.$payloadEncoded"
            
            # Sign with openssl
            $signatureFile = Join-Path $env:TEMP "sig-$([Guid]::NewGuid()).bin"
            $dataFile = Join-Path $env:TEMP "data-$([Guid]::NewGuid()).txt"
            
            try {
              $dataToSign | Out-File -FilePath $dataFile -Encoding ASCII -NoNewline
              
              # Sign the data using openssl
              $opensslOutput = & openssl dgst -sha256 -sign $tempKeyFile -out $signatureFile $dataFile 2>&1
              if ($LASTEXITCODE -ne 0) {
                Write-Host "::error::OpenSSL signing failed: $opensslOutput"
                exit 1
              }
              
              # Read signature and encode
              $signatureBytes = [System.IO.File]::ReadAllBytes($signatureFile)
              $signatureBase64 = [Convert]::ToBase64String($signatureBytes)
              $signatureEncoded = $signatureBase64.TrimEnd('=').Replace('+', '-').Replace('/', '_')
              
              $jwt = "$headerEncoded.$payloadEncoded.$signatureEncoded"
            }
            finally {
              if (Test-Path $signatureFile) { Remove-Item $signatureFile -Force -ErrorAction SilentlyContinue }
              if (Test-Path $dataFile) { Remove-Item $dataFile -Force -ErrorAction SilentlyContinue }
            }
            
            # Get installation access token using direct endpoint
            $owner = "${{ github.repository_owner }}"
            $headers = @{
              "Accept" = "application/vnd.github+json"
              "Authorization" = "Bearer $jwt"
              "X-GitHub-Api-Version" = "2022-11-28"
            }
            
            # Try organization endpoint first
            $installationUrl = "https://api.github.com/orgs/$owner/installation"
            
            try {
              $installation = Invoke-RestMethod -Uri $installationUrl -Headers $headers -Method Get -ErrorAction Stop
              Write-Host "Installation found for organization: $owner"
            }
            catch {
              $statusCode = $_.Exception.Response.StatusCode.value__
              if ($statusCode -eq 404) {
                # Not an organization, try as user
                Write-Host "Not an organization, trying as user..."
                $installationUrl = "https://api.github.com/users/$owner/installation"
                try {
                  $installation = Invoke-RestMethod -Uri $installationUrl -Headers $headers -Method Get -ErrorAction Stop
                  Write-Host "Installation found for user: $owner"
                }
                catch {
                  $userStatusCode = $_.Exception.Response.StatusCode.value__
                  if ($userStatusCode -eq 404) {
                    Write-Host "::error::GitHub App is not installed for '$owner'"
                    Write-Host "::error::Please install the app at the organization/user settings"
                  } else {
                    Write-Host "::error::Failed to get installation: $($_.Exception.Message)"
                  }
                  exit 1
                }
              } else {
                Write-Host "::error::Failed to get installation: $($_.Exception.Message)"
                exit 1
              }
            }
            
            $tokenUrl = $installation.access_tokens_url
            $tokenResponse = Invoke-RestMethod -Uri $tokenUrl -Headers $headers -Method Post
            $accessToken = $tokenResponse.token
            
            # Store both the JWT and the current repo installation token
            Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "token=$accessToken"
            Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "jwt=$jwt"
            Write-Host "[OK] GitHub App authentication successful"
          }
          finally {
            if (Test-Path $tempKeyFile) {
              Remove-Item -Path $tempKeyFile -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ matrix.branch }}
          token: ${{ steps.GenerateJWT.outputs.token }}

      - name: Initialize the workflow
        id: init
        uses: microsoft/AL-Go-Actions/WorkflowInitialize@v8.2
        with:
          shell: powershell

      - name: Read settings
        uses: microsoft/AL-Go-Actions/ReadSettings@v8.2
        with:
          shell: powershell
          get: commitOptions

      - name: Calculate Commit Options
        env:
          directCommit: "${{ github.event.inputs.directCommit }}"
          downloadLatest: "${{ github.event.inputs.downloadLatest }}"
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0
          if('${{ github.event_name }}' -eq 'workflow_dispatch') {
            Write-Host "Using inputs from workflow_dispatch event"
            $directCommit = $env:directCommit
            $downloadLatest = $env:downloadLatest
          }
          else {
            Write-Host "Using inputs from commitOptions setting (workflow_run trigger)"
            $commitOptions = $env:commitOptions | ConvertFrom-Json
            $directCommit=$(-not $commitOptions.createPullRequest)
            $downloadLatest=$true
          }
          Add-Content -Encoding UTF8 -Path $env:GITHUB_ENV -Value "directCommit=$directCommit"
          Add-Content -Encoding UTF8 -Path $env:GITHUB_ENV -Value "downloadLatest=$downloadLatest"

      - name: Update AL Development Collection
        env:
          GITHUB_TOKEN: ${{ steps.GenerateJWT.outputs.token }}
          GITHUB_JWT: ${{ steps.GenerateJWT.outputs.jwt }}
          GITHUB_DEFAULT_TOKEN: ${{ github.token }}
          TEMPLATE_URL: ${{ needs.Initialize.outputs.TemplateUrl }}
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0
          $templateUrl = $env:TEMPLATE_URL
          if ($templateUrl -match '^https://github\.com/([^/]+)/([^/@]+)(?:@(.+))?$') {
            $owner = $Matches[1]
            $repo = $Matches[2]
            $ref = if ($Matches[3]) { $Matches[3] } else { "main" }
          }
          else {
            Write-Host "::error::Invalid template URL format: $templateUrl"
            exit 1
          }
          Write-Host "Template: $owner/$repo@$ref"
          Write-Host "Target directory: .AL-Go/.github"
          $tempDir = Join-Path $env:TEMP ([Guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $tempDir | Out-Null
          try {
            Write-Host "Downloading AL Development Collection from template..."
            $apiUrl = "https://api.github.com/repos/$owner/$repo/contents/.AL-Go/.github?ref=$ref"
            Write-Host "API URL: $apiUrl"
            
            # Start with the current repo token
            $downloadHeaders = @{
              "Accept" = "application/vnd.github.v3+json"
              "User-Agent" = "GitHub-Actions"
            }
            
            $tokenToUse = $env:GITHUB_TOKEN
            $tokenSource = "Current repo installation token"
            
            if ($tokenToUse) {
              $downloadHeaders["Authorization"] = "Bearer $tokenToUse"
              
              # Test if token has access to template repository
              Write-Host "Testing access to template repository ($owner/$repo)..."
              try {
                $repoInfo = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo" -Headers $downloadHeaders -Method Get -ErrorAction Stop
                Write-Host "  Repository: $($repoInfo.full_name)"
                Write-Host "  Default branch: $($repoInfo.default_branch)"
                Write-Host "  Private: $($repoInfo.private)"
                Write-Host "  Access: OK with current installation token"
              }
              catch {
                Write-Host "::warning::Current installation token cannot access template repository"
                Write-Host "::warning::Attempting to get installation token for '$owner' organization..."
                
                # Try to get installation token for the template repo's organization using JWT
                if ($env:GITHUB_JWT) {
                  try {
                    $jwtHeaders = @{
                      "Accept" = "application/vnd.github+json"
                      "Authorization" = "Bearer $env:GITHUB_JWT"
                      "X-GitHub-Api-Version" = "2022-11-28"
                    }
                    
                    # Get installation using direct endpoint
                    Write-Host "  Looking for installation: $owner"
                    
                    # Try organization endpoint first
                    $ownerInstallationUrl = "https://api.github.com/orgs/$owner/installation"
                    
                    try {
                      $templateInstallation = Invoke-RestMethod -Uri $ownerInstallationUrl -Headers $jwtHeaders -Method Get -ErrorAction Stop
                      Write-Host "  Found installation for organization: $owner"
                    }
                    catch {
                      $statusCode = $_.Exception.Response.StatusCode.value__
                      if ($statusCode -eq 404) {
                        # Not an organization, try as user
                        Write-Host "  Not an organization, trying as user..."
                        $ownerInstallationUrl = "https://api.github.com/users/$owner/installation"
                        try {
                          $templateInstallation = Invoke-RestMethod -Uri $ownerInstallationUrl -Headers $jwtHeaders -Method Get -ErrorAction Stop
                          Write-Host "  Found installation for user: $owner"
                        }
                        catch {
                          $templateInstallation = $null
                        }
                      } else {
                        $templateInstallation = $null
                      }
                    }
                    
                    if ($templateInstallation) {
                      Write-Host "  Found installation for '$owner'"
                      $tokenUrl = $templateInstallation.access_tokens_url
                      $tokenResponse = Invoke-RestMethod -Uri $tokenUrl -Headers $jwtHeaders -Method Post
                      $tokenToUse = $tokenResponse.token
                      $tokenSource = "Installation token for '$owner'"
                      $downloadHeaders["Authorization"] = "Bearer $tokenToUse"
                      
                      # Verify access
                      $repoInfo = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo" -Headers $downloadHeaders -Method Get -ErrorAction Stop
                      Write-Host "  Repository: $($repoInfo.full_name)"
                      Write-Host "  Access: OK with '$owner' installation token"
                    }
                    else {
                      Write-Host "::warning::No installation found for '$owner'"
                      Write-Host "::warning::Trying with default GitHub token..."
                      
                      if ($env:GITHUB_DEFAULT_TOKEN) {
                        $tokenToUse = $env:GITHUB_DEFAULT_TOKEN
                        $tokenSource = "Default GitHub token"
                        $downloadHeaders["Authorization"] = "Bearer $tokenToUse"
                        
                        $repoInfo = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo" -Headers $downloadHeaders -Method Get -ErrorAction Stop
                        Write-Host "  Repository: $($repoInfo.full_name)"
                        Write-Host "  Access: OK with default token"
                      }
                      else {
                        throw "No valid token found for accessing template repository"
                      }
                    }
                  }
                  catch {
                    Write-Host "::error::Cannot access template repository $owner/$repo"
                    Write-Host "::error::Error: $($_.Exception.Message)"
                    Write-Host "::error::Please ensure the GitHub App is installed on '$owner' organization with Contents:Read permission"
                    throw
                  }
                }
                else {
                  Write-Host "::error::No JWT available to get installation token for '$owner'"
                  throw
                }
              }
            }
            
            Write-Host "Using token: $tokenSource"
            $headers = $downloadHeaders
            function Download-GitHubDirectory {
              param($url, $targetPath)
              try {
                $response = Invoke-RestMethod -Uri $url -Headers $headers -Method Get
              }
              catch {
                Write-Host "::error::Failed to download from: $url"
                Write-Host "::error::Status: $($_.Exception.Response.StatusCode)"
                Write-Host "::error::Error: $($_.Exception.Message)"
                throw
              }
              foreach ($item in $response) {
                $itemPath = Join-Path $targetPath $item.name
                if ($item.type -eq "file") {
                  Write-Host "  Downloading: $($item.path)"
                  $content = Invoke-RestMethod -Uri $item.download_url -Headers $headers
                  $itemDir = Split-Path -Parent $itemPath
                  if (-not (Test-Path $itemDir)) {
                    New-Item -ItemType Directory -Path $itemDir -Force | Out-Null
                  }
                  [System.IO.File]::WriteAllText($itemPath, $content, [System.Text.UTF8Encoding]::new($false))
                }
                elseif ($item.type -eq "dir") {
                  Write-Host "  Processing directory: $($item.path)"
                  if (-not (Test-Path $itemPath)) {
                    New-Item -ItemType Directory -Path $itemPath | Out-Null
                  }
                  Download-GitHubDirectory -url $item.url -targetPath $itemPath
                }
              }
            }
            Download-GitHubDirectory -url $apiUrl -targetPath $tempDir
            $downloadedFiles = Get-ChildItem -Path $tempDir -Recurse -File
            if ($downloadedFiles.Count -eq 0) {
              Write-Host "::error::No files were downloaded from template repository"
              exit 1
            }
            Write-Host "`nDownloaded $($downloadedFiles.Count) files"
            $targetDir = Join-Path $PWD ".AL-Go/.github"
            Write-Host "`nUpdating $targetDir..."
            if (-not (Test-Path $targetDir)) {
              Write-Host "Creating target directory..."
              New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
            }
            Write-Host "Merging AL Development Collection (preserving additional content)..."
            # Use robocopy to merge directories while preserving additional content
            # /E - Copy subdirectories, including empty ones
            # /XO - Exclude older files (don't overwrite newer files in destination)
            # /NJH /NJS /NDL /NFL - Suppress robocopy headers and file lists for cleaner output
            # /R:3 /W:1 - Limit retries
            $robocopyResult = robocopy $tempDir $targetDir /E /R:3 /W:1 /NJH /NJS
            # Robocopy exit codes: 0-7 are success, 8+ are errors
            $robocopyExitCode = $LASTEXITCODE
            if ($robocopyExitCode -ge 8) {
              Write-Host "::warning::Robocopy reported errors (exit code: $robocopyExitCode)"
              Write-Host "Output: $robocopyResult"
            }
            else {
              Write-Host "Files synchronized successfully"
            }
            $changes = git status --porcelain
            if (-not $changes) {
              Write-Host "`n[OK] No changes detected. AL Development Collection is already up to date."
              exit 0
            }
            Write-Host "`n[OK] AL Development Collection updated successfully"
            Write-Host "`nChanges:"
            git status --short
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ".AL-Go/.github"
            $commitMessage = "Update AL Development Collection from $templateUrl"
            $commitDescription = "Updated AL Development Collection (AI-Native Instructions for AL Development)`n" +
              "Source: $owner/$repo@$ref`n" +
              "Target: .AL-Go/.github`n`n" +
              "This update includes:`n" +
              "- Agent definitions (architect, developer, debugger, tester, etc.)`n" +
              "- Instructions for code style, naming, performance, error handling`n" +
              "- Agentic workflow prompts for common development tasks`n`n" +
              "Note: Additional directories and files in .AL-Go/.github are preserved.`n`n" +
              "Auto-generated by Update AL Development Collection workflow"
            git commit -m $commitMessage -m $commitDescription
            if ($env:directCommit -eq 'true') {
              Write-Host "`nPushing commit directly to ${{ matrix.branch }}..."
              
              # Use GitHub App token for push (not the fallback token)
              $pushHeaders = @{
                "Accept" = "application/vnd.github.v3+json"
                "Authorization" = "Bearer $env:GITHUB_TOKEN"
              }
              
              git push origin HEAD:${{ matrix.branch }}
              Write-Host "[OK] Changes committed and pushed successfully"
            }
            else {
              Write-Host "`nCreating pull request..."
              $branchName = "update-al-dev-collection-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
              git checkout -b $branchName
              git push origin HEAD:$branchName
              
              # Use GitHub App token for PR creation (not the fallback token)
              $prHeaders = @{
                "Accept" = "application/vnd.github.v3+json"
                "Authorization" = "Bearer $env:GITHUB_TOKEN"
              }
              
              $prTitle = "Update AL Development Collection"
              $prDescription = "## 🤖 Automated Update`n`n" +
                "This PR updates the AL Development Collection from the template repository.`n`n" +
                "**Source:** ``$owner/$repo@$ref```n" +
                "**Target:** ``.AL-Go/.github```n`n" +
                "### Changes`n`n" +
                "Updates all AI-Native Instructions including agents, instructions, and workflow prompts.`n`n" +
                "**Note:** Additional directories and files in ``.AL-Go/.github`` are preserved during this update.`n`n" +
                "---`n" +
                "*Auto-generated by [Update AL Development Collection workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
              $prBodyJson = @{
                title = $prTitle
                head = $branchName
                base = "${{ matrix.branch }}"
                body = $prDescription
              } | ConvertTo-Json
              $prUrl = "https://api.github.com/repos/${{ github.repository }}/pulls"
              $pr = Invoke-RestMethod -Uri $prUrl -Headers $prHeaders -Method Post -Body $prBodyJson -ContentType "application/json"
              Write-Host "[OK] Pull request created: $($pr.html_url)"
            }
          }
          finally {
            if (Test-Path $tempDir) {
              Remove-Item -Path $tempDir -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Finalize the workflow
        if: always()
        uses: microsoft/AL-Go-Actions/WorkflowPostProcess@v8.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          shell: powershell
          telemetryScopeJson: ${{ steps.init.outputs.telemetryScopeJson }}
          currentJobContext: ${{ toJson(job) }}

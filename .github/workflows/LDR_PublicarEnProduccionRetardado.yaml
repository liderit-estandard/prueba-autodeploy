name: "LDR: Publicar en producción (retardado)"

on:
  schedule:
      - cron: '45 23 22 4 *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  LanzarPublicacion:
    runs-on: [ ubuntu-latest ]
    name: Lanzar publicación a producción
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Block manual execution without scheduled cron
        if: github.event_name != 'schedule'
        run: |
          if grep -qE '^\s+- cron:' .github/workflows/LDR_PublicarEnProduccionRetardado.yaml; then
            echo "Hay cron activo en el workflow. Ejecución manual permitida."
          else
            echo "::error::Este workflow solo debe ejecutarse mediante su cron programado. No hay cron activo actualmente (fue eliminado tras la última ejecución o aún no se ha configurado un release)."
            exit 1
          fi

      - name: Check scheduled execution delay
        if: github.event_name == 'schedule'
        run: |
          CRON="${{ github.event.schedule }}"

          CRON_MIN=$(echo "$CRON"  | awk '{print $1}')
          CRON_HOUR=$(echo "$CRON" | awk '{print $2}')
          CRON_DAY=$(echo "$CRON"  | awk '{print $3}')
          CRON_MONTH=$(echo "$CRON" | awk '{print $4}')
          CRON_YEAR=$(date -u +%Y)

          SCHEDULED_TS=$(date -u -d "${CRON_YEAR}-${CRON_MONTH}-${CRON_DAY} ${CRON_HOUR}:${CRON_MIN}:00" +%s)
          CURRENT_TS=$(date -u +%s)
          DIFF_SECS=$(( CURRENT_TS - SCHEDULED_TS ))
          DIFF_HOURS=$(( DIFF_SECS / 3600 ))
          DIFF_MINS=$(( (DIFF_SECS % 3600) / 60 ))

          echo "Hora programada (UTC): ${CRON_YEAR}-${CRON_MONTH}-${CRON_DAY} ${CRON_HOUR}:${CRON_MIN}"
          echo "Hora actual (UTC): $(date -u '+%Y-%m-%d %H:%M')"
          echo "Retraso: ${DIFF_HOURS}h ${DIFF_MINS}m"

          if [ "$DIFF_SECS" -gt 10800 ]; then
            echo "::error::Ejecución cancelada: el workflow se ha iniciado ${DIFF_HOURS}h ${DIFF_MINS}m después de la hora programada, superando el límite de 3 horas."
            exit 1
          fi

          echo "Retraso dentro del límite permitido (3 horas). Continuando ejecución."

      - name: Read NombreEntorno from LDR-Settings.json
        id: settings
        run: |
          nombreEntorno=$(jq -r '.NombreEntorno' .github/LDR-Settings.json)
          if [ -z "$nombreEntorno" ]; then
            echo "ERROR: NombreEntorno is empty in LDR-Settings.json"
            exit 1
          fi
          echo "nombreEntorno=$nombreEntorno" >> $GITHUB_OUTPUT
          echo "NombreEntorno leído: $nombreEntorno"

      - name: Trigger Publish To Environment workflow
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/PublishToEnvironment.yaml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"environmentName\":\"${{ steps.settings.outputs.nombreEntorno }}\",\"appVersion\":\"current\",\"createEnvIfNotExists\":\"false\"}}"
          echo "Publish To Environment workflow triggered for environment: ${{ steps.settings.outputs.nombreEntorno }}"

  RemoveCronAfterExecution:
    name: Eliminar cron tras ejecución programada
    needs: [ LanzarPublicacion ]
    # if: github.event_name == 'schedule'
    runs-on: [ ubuntu-latest ]
    outputs:
      pr_number: ${{ steps.cpr.outputs.pull-request-number }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Generate GitHub App token
        id: GenerateJWT
        shell: pwsh
        env:
          GH_TOKEN_WORKFLOW: ${{ secrets.GHTOKENWORKFLOW }}
        run: |
          $errorActionPreference = "Stop"; $ProgressPreference = "SilentlyContinue"; Set-StrictMode -Version 2.0
          if (-not $env:GH_TOKEN_WORKFLOW) {
            Write-Host "::error::Secret GHTOKENWORKFLOW is not configured"
            exit 1
          }
          $tokenData = $env:GH_TOKEN_WORKFLOW | ConvertFrom-Json
          $clientId = $tokenData.GitHubAppClientId
          $privateKey = $tokenData.PrivateKey -replace '\\n', "`n"
          if ($privateKey -notmatch "`n") {
            if ($privateKey -match '^(-----BEGIN [^-]+-----)(.+?)(-----END [^-]+-----)$') {
              $header = $Matches[1]; $body = $Matches[2]; $footer = $Matches[3]
              $bodyLines = for ($i = 0; $i -lt $body.Length; $i += 64) { $body.Substring($i, [Math]::Min(64, $body.Length - $i)) }
              $privateKey = "$header`n$($bodyLines -join "`n")`n$footer"
            }
          }
          $tempKeyFile = Join-Path $env:RUNNER_TEMP "gh-app-key-$([Guid]::NewGuid()).pem"
          [System.IO.File]::WriteAllText($tempKeyFile, $privateKey, [System.Text.UTF8Encoding]::new($false))
          try {
            $now = [Math]::Floor([decimal](Get-Date -UFormat %s))
            $headerEncoded  = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes('{"alg":"RS256","typ":"JWT"}')).TrimEnd('=').Replace('+','-').Replace('/','_')
            $payloadEncoded = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes("{`"iat`":$($now-60),`"exp`":$($now+600),`"iss`":`"$clientId`"}")).TrimEnd('=').Replace('+','-').Replace('/','_')
            $dataFile = Join-Path $env:RUNNER_TEMP "data-$([Guid]::NewGuid()).txt"
            $sigFile  = Join-Path $env:RUNNER_TEMP "sig-$([Guid]::NewGuid()).bin"
            "$headerEncoded.$payloadEncoded" | Out-File $dataFile -Encoding ASCII -NoNewline
            & openssl dgst -sha256 -sign $tempKeyFile -out $sigFile $dataFile 2>&1 | Out-Null
            $sigEncoded = [Convert]::ToBase64String([System.IO.File]::ReadAllBytes($sigFile)).TrimEnd('=').Replace('+','-').Replace('/','_')
            $jwt = "$headerEncoded.$payloadEncoded.$sigEncoded"
            Remove-Item $dataFile, $sigFile -Force -ErrorAction SilentlyContinue
            $headers = @{ "Accept"="application/vnd.github+json"; "Authorization"="Bearer $jwt"; "X-GitHub-Api-Version"="2022-11-28" }
            $owner = "${{ github.repository_owner }}"
            try { $installation = Invoke-RestMethod -Uri "https://api.github.com/orgs/$owner/installation" -Headers $headers -Method Get }
            catch { $installation = Invoke-RestMethod -Uri "https://api.github.com/users/$owner/installation" -Headers $headers -Method Get }
            $token = (Invoke-RestMethod -Uri $installation.access_tokens_url -Headers $headers -Method Post).token
            Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "token=$token"
            Write-Host "[OK] GitHub App token generated"
          }
          finally { Remove-Item $tempKeyFile -Force -ErrorAction SilentlyContinue }

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.GenerateJWT.outputs.token }}
          persist-credentials: false

      - name: Remove cron and push
        run: |
          python3 << 'PYEOF'
          import re
          filepath = '.github/workflows/LDR_PublicarEnProduccionRetardado.yaml'
          with open(filepath) as f:
              lines = f.readlines()
          in_on_block = False
          schedule_indent = None
          remove_indices = []
          for i, line in enumerate(lines):
              stripped = line.lstrip()
              indent = len(line) - len(stripped)
              if re.match(r'^on:\s*$', line):
                  in_on_block = True
                  continue
              if in_on_block:
                  if stripped and indent == 0:
                      in_on_block = False
                      continue
                  if re.match(r'\s+schedule:\s*$', line):
                      schedule_indent = indent
                      remove_indices.append(i)
                  elif schedule_indent is not None:
                      if stripped and indent <= schedule_indent:
                          schedule_indent = None
                      else:
                          remove_indices.append(i)
          if remove_indices:
              lines = [l for i, l in enumerate(lines) if i not in remove_indices]
              print(f'Sección schedule eliminada ({len(remove_indices)} líneas).')
          else:
              print('No se encontró sección schedule bajo on:, nada que eliminar.')
          with open(filepath, 'w') as f:
              f.writelines(lines)
          PYEOF
          echo "Cron eliminado."

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ steps.GenerateJWT.outputs.token }}
          title: "LDR: eliminar cron de LDR_PublicarEnProduccionRetardado tras ejecución
            programada"
          body: "Elimina la sección schedule del workflow tras ejecutarse el cron."
          branch: ldr/remove-cron
          commit-message: "LDR: eliminar cron de LDR_PublicarEnProduccionRetardado tras
            ejecución programada"

      - name: Check PR merge state
        id: pr_state
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ steps.GenerateJWT.outputs.token }}
        run: |
          merge_state=$(gh pr view "${{ steps.cpr.outputs.pull-request-number }}" \
            --repo ${{ github.repository }} \
            --json mergeStateStatus \
            --jq '.mergeStateStatus')
          echo "mergeStateStatus=$merge_state"
          echo "merge-state=$merge_state" >> $GITHUB_OUTPUT

      - name: Habilitar Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created' &&
          steps.pr_state.outputs.merge-state != 'CLEAN'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ steps.GenerateJWT.outputs.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

  Auto-aprobacion:
    name: Auto-aprobar Pull Request de eliminación de cron
    runs-on: ubuntu-latest
    needs: [ RemoveCronAfterExecution ]
    if: needs.RemoveCronAfterExecution.outputs.pr_number != ''
    permissions:
      pull-requests: write
    steps:
      - name: Auto-aprobar el pull request
        uses: hmarr/auto-approve-action@v3
        with:
          review-message: "Autoaprobado"
          pull-request-number: ${{ needs.RemoveCronAfterExecution.outputs.pr_number }}
          github-token: ${{ secrets.GHTOKEN_AUTO }}

      - name: Merge Pull Request
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GHTOKEN_AUTO }}
        run: |
          pr_number=${{ needs.RemoveCronAfterExecution.outputs.pr_number }}
          for attempt in 1 2 3 4 5 6; do
            pr_info=$(gh pr view "$pr_number" \
              --repo ${{ github.repository }} \
              --json state,mergeStateStatus,reviewDecision,isDraft)
            state=$(echo "$pr_info" | jq -r '.state')
            merge_state=$(echo "$pr_info" | jq -r '.mergeStateStatus')
            review_decision=$(echo "$pr_info" | jq -r '.reviewDecision')
            is_draft=$(echo "$pr_info" | jq -r '.isDraft')

            echo "Intento $attempt: state=$state mergeStateStatus=$merge_state reviewDecision=$review_decision isDraft=$is_draft"

            if [ "$state" = "MERGED" ] || [ "$state" = "CLOSED" ]; then
              echo "PR ya cerrado/mergeado, nada que hacer."
              exit 0
            fi

            if [ "$is_draft" = "true" ]; then
              echo "El PR sigue en draft. No se puede mergear automáticamente."
              exit 0
            fi

            if [ "$merge_state" = "CLEAN" ] && [ "$review_decision" = "APPROVED" ]; then
              echo "PR mergeable y aprobado. Ejecutando merge manual como fallback."
              gh pr merge "$pr_number" \
                --squash \
                -R ${{ github.repository }}
              exit 0
            fi

            if [ "$attempt" -lt 6 ]; then
              echo "GitHub aún no marca el PR como mergeable. Reintentando en 10s..."
              sleep 10
            fi
          done

          echo "El PR sigue abierto pero no quedó mergeable dentro del tiempo de espera. Se deja para automerge o revisión manual."
          exit 0

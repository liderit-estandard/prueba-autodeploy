name: "LDR: Publicar en produccion (retardado)"

on:
    schedule:
        - cron: "0 6 * * 1" # Every Monday at 06:00 UTC - adjust as needed
    workflow_dispatch: # Allow manual triggering

permissions:
    actions: write
    contents: read

defaults:
    run:
        shell: bash

jobs:
    TriggerPublish:
        runs-on: [ubuntu-latest]
        steps:
            - name: Trigger Publish To Environment workflow
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  curl -s -X POST \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer $GITHUB_TOKEN" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    https://api.github.com/repos/${{ github.repository }}/actions/workflows/PublishToEnvironment.yaml/dispatches \
                    -d '{"ref":"${{ github.ref_name }}","inputs":{"environmentName":"PROD*","appVersion":"current","createEnvIfNotExists":"false"}}'
                  echo "Publish To Environment workflow triggered for PROD* environments."
